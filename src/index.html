<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Viewer v2</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        background: #000;
        width: 100%;
        height: 100%;
        overflow: auto;
      }

      #container {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-width: 100%;
        min-height: 100%;
      }

      #img {
        display: block;
        width: auto;
        height: auto;
        transform-origin: 0 0;
      }

      #info {
        position: fixed;
        bottom: 10px;
        left: 10px;
        color: rgba(255, 255, 255, 0.35);
        font-size: 11px;
        font-family: monospace;
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="container" tabindex="-1" style="outline:none">
      <img id="img" src="" alt="" />
    </div>
    <div id="info"></div>

    <script>
      const { invoke } = window.__TAURI__.core;

      let currentIndex = 0;
      let totalCount = 0;
      let zoom = 1.0;
      let sortMode = "modified-desc";
      let fitMode = "none"; // "none" | "width" | "height"

      const img = document.getElementById("img");
      const info = document.getElementById("info");

      function applyFit() {
        if (fitMode === "width") {
          img.style.width = "100vw";
          img.style.height = "auto";
        } else if (fitMode === "height") {
          img.style.width = "auto";
          img.style.height = "100vh";
        } else {
          img.style.width = "auto";
          img.style.height = "auto";
        }
        zoom = 1.0;
        img.style.transform = "scale(1)";
        img.style.transformOrigin = "0 0";
      }

      function updateInfo() {
        const sortLabel = sortMode === "name-asc" ? "name" : "modified";
        const fitLabel = fitMode === "width" ? "  fit-w" : fitMode === "height" ? "  fit-h" : "";
        info.textContent = `${currentIndex + 1} / ${totalCount}  ${sortLabel}${fitLabel}`;
      }

      async function loadImage() {
        const dataUrl = await invoke("load_image", { index: currentIndex });
        img.onload = () => {
          applyFit();
          document.documentElement.scrollTop = 0;
          document.body.scrollTop = 0;
        };
        img.src = dataUrl;
        updateInfo();
      }

      async function init() {
        totalCount = await invoke("get_image_count");
        if (totalCount > 0) {
          await loadImage();
        }
      }

      window.addEventListener("wheel", (e) => {
        e.preventDefault();
        const rect = img.getBoundingClientRect();
        const ox = (e.clientX - rect.left) / zoom;
        const oy = (e.clientY - rect.top) / zoom;
        img.style.transformOrigin = `${ox}px ${oy}px`;
        const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
        zoom = Math.min(10, Math.max(0.1, zoom * factor));
        img.style.transform = `scale(${zoom})`;
      }, { passive: false });

      window.addEventListener("keydown", async (e) => {
        if (e.key === "PageDown") {
          e.preventDefault();
          const atBottom = Math.ceil(window.scrollY + window.innerHeight) >= document.documentElement.scrollHeight;
          if (atBottom) {
            if (currentIndex < totalCount - 1) {
              currentIndex++;
              await loadImage();
            }
          } else {
            window.scrollBy(0, window.innerHeight);
          }
        } else if (e.key === "PageUp") {
          e.preventDefault();
          const atTop = window.scrollY <= 0;
          if (atTop) {
            if (currentIndex > 0) {
              currentIndex--;
              await loadImage();
            }
          } else {
            window.scrollBy(0, -window.innerHeight);
          }
        } else if (e.key === "Home") {
          e.preventDefault();
          if (currentIndex !== 0) {
            currentIndex = 0;
            await loadImage();
          }
        } else if (e.key === "End") {
          e.preventDefault();
          if (currentIndex !== totalCount - 1) {
            currentIndex = totalCount - 1;
            await loadImage();
          }
        } else if (e.key === "w") {
          fitMode = fitMode === "width" ? "none" : "width";
          applyFit();
          updateInfo();
        } else if (e.key === "h") {
          fitMode = fitMode === "height" ? "none" : "height";
          applyFit();
          updateInfo();
        } else if (e.key === "o") {
          fitMode = "none";
          applyFit();
          updateInfo();
        } else if (e.key === "]") {
          try {
            await invoke("move_archive", { direction: 1 });
            currentIndex = 0;
            fitMode = "none";
            totalCount = await invoke("get_image_count");
            await loadImage();
          } catch (_) {}
        } else if (e.key === "[") {
          try {
            await invoke("move_archive", { direction: -1 });
            currentIndex = 0;
            fitMode = "none";
            totalCount = await invoke("get_image_count");
            await loadImage();
          } catch (_) {}
        } else if (e.key === "F11") {
          e.preventDefault();
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
          } else {
            document.exitFullscreen();
          }
        } else if (e.key === "F9") {
          sortMode = await invoke("toggle_sort");
          updateInfo();
        } else if (e.key === "q" && e.ctrlKey) {
          e.preventDefault();
          await invoke("quit");
        }
      });

      window.addEventListener("DOMContentLoaded", () => {
        document.getElementById("container").focus({ preventScroll: true });
        init();
      });
    </script>
  </body>
</html>
